experience:
  - role: "Архитектор ПО"
    org: "Scanner Travel LLC"
    start: "2025-01-01"
    summary: "* Спроектировал архитектуру ПО для хранилища данных лизинговой компании, консолидируя данные из основных систем для улучшения отчетности, анализа рисков и принятия решений.


      * Спроектировал рефакторинг основного монолита в сервис-ориентированную архитектуру (SOA) для лизинговой компании, определив границы сервисов, контракты интеграции и план миграции для повышения масштабируемости и ускорения вывода новых функций на рынок.


      * Спроектировал и разработал новые функции для клиентского портала нефтяной компании, расширив возможности самообслуживания и улучшив видимость контрактов и операций для бизнес-пользователей.\n"
  - role: "Ведущий разработчик ПО (Тимлид SWE платформенной команды)"
    org: "Huma Therapeutics Ltd."
    start: "2021-01-11"
    end: "2024-06-17"
    summary: "* Спроектировал и запустил кастомный внутренний портал разработчиков (IDP), демонстрирующий клинические испытания Huma и приложения мониторинга пациентов, устранив узкое место в демонстрациях DevOps и став одним из трех облачных ценностных потоков, выделенных в инвестиционном раунде 2023 года.


      * Обеспечил возможность менеджерам продуктов самостоятельно готовить клиентские демо через IDP, устранив зависимость от команды DevOps с низкой пропускной способностью и сократив время подготовки демо.


      * Автоматизировал preview-окружения для pull request'ов бэкенда API, сократив задержку деплоя на 95% с 8 ч до 15 мин.


      * Создал Kubernetes-операторы для on-demand provisioning AWS S3, Google Cloud Storage, Atlas MongoDB, PostgreSQL и Redis, автоматизировав управление облачными ресурсами и сократив затраты на инфраструктуру примерно на 40%.


      * Обновил CI/CD с Argo CD, Grafana Cloud и связанным инструментарием, повысив скорость и надежность релизов облачных платформенных сервисов.


      * Нанял, возглавил и менторствовал команду из двух старших инженеров ПО в течение двух лет, задавая техническое направление для внутренней платформы.\n"
  - role: "Главный технический директор"
    org: "Sittme"
    start: "2019-11-20"
    end: "2020-06-30"
    summary: "* Возглавил кросс-функциональную команду (PM, дизайнер, QA, бэкенд-, фронтенд- и мобильные разработчики) для создания и эксплуатации мобильной платформы для сообществ нянь, согласовывая поставки с продуктовыми и бизнес-целями.


      * Спроектировал и реализовал ключевые функции вовлеченности, такие как уведомления в приложении и видеозвонки, улучшив коммуникацию между родителями и нянями.


      * Развернул 24 микросервиса в приватном Kubernetes-кластере для продакшена и стейджинга, повысив надежность и масштабируемость платформы.


      * Автоматизировал CI/CD-пайплайны для ускорения тестирования и деплоев, сократив циклы обратной связи для команды разработки.


      * Обнаруживал и устранял проблемы в продакшене по всем сервисам, повысив стабильность платформы и доверие пользователей.


      * Менторствовал бэкенд- и фронтенд-разработчиков, повысив качество кода и автономность поставок в команде.\n"
  - role: "Старший разработчик ПО"
    org: "T-Bank (ex. Tinkoff)"
    start: "2018-11-19"
    end: "2019-05-31"
    summary: "* Создал и запустил CMS для голосового ассистента на Flask и PostgreSQL, дав продуктовым командам самообслуживание над голосовыми сценариями и контентом.


      * Переработал API с низкой задержкой на Go с Redis и PostgreSQL для выполнения строгих требований к задержке и надежности голосового ассистента банка.


      * Рефакторил сервис text-to-speech API с async gRPC на Python, повысив пропускную способность и упростив обслуживание.


      * Развернул сервисы в Kubernetes-кластере и автоматизировал CI/CD с TeamCity, сократив ручной труд по деплоям и стандартизировав процессы релизов.


      * Проводил код-ревью, собеседования и менторство, помогая расти команде и поддерживать высокие инженерные стандарты.\n"
  - role: "Ведущий разработчик ПО"
    org: "Vzor Systems, LLC"
    start: "2017-05-03"
    end: "2018-09-10"
    summary: "* Спроектировал архитектуру и разработал ПО для биометрической идентификации, включая GUI-клиент, сервер и embedded-компоненты, обеспечив высокоточную верификацию идентичности для клиентов.


      * Нанял и возглавил команду из двух разработчиков ПО, определив практики разработки и руководя доставкой биометрических функций.


      * Применил классические алгоритмы обработки изображений и CNN для оптимизации точности и производительности распознавания идентичности.


      * Провел технологические proof-of-concept тесты и подготовил отчеты, соответствующие NIST, продемонстрировав производительность решения заинтересованным сторонам и регуляторам.


      * Представил прототипы биометрической идентификации на российских конференциях, таких как All-over-IP, SKUD и TB Security Technology, повысив видимость и credibility продукта.\n"
  - role: "Разработчик бэкенда"
    org: "Bigur-consulting, LLC"
    start: "2016-11-01"
    end: "2017-05-01"
    summary: "Разработал бэкенд веб-коммерции для импортера вина с использованием внутренней Python-фреймворка.\n"
  - role: "Разработчик C++"
    org: "Asoft, LLC"
    start: "2011-03-15"
    end: "2016-05-27"
    summary: "* Разработал и поставил клиент-серверное приложение для симуляции технологических операций вокзалов, позволив клиенту выполнить контракт на модернизацию путей станции Сызрань-1.


      * Спроектировал и поставил кастомную клиент-серверную систему для прогнозирования энергопотребления в поездах, дав операторам лучшие возможности планирования и контроля затрат.


      * Взял на себя два проекта в работе после ухода ведущего программиста, стабилизировав поставки и сохранив знания для клиента.


      * Успешно поставлял ПО, поддерживая в продакшене базы MySQL и Oracle.


      * Сотрудничал с менеджером проекта и двумя стажерами для достижения целей, менторствуя junior-разработчиков.\n"
  - role: "Инженер"
    org: "Государственный научно-исследовательский и производственный центр имени М. В. Хруничева"
    start: "2010-11-01"
    end: "2012-01-10"
    summary: "* Разработал два Windows-приложения для расчета траекторий спутников на C++ и Borland C++ Builder, поддерживая команды аэрокосмических исследований и анализа миссий.\n"
